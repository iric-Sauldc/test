<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #39ff14;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            text-align: center;
        }
        h1 {
            font-size: 4em;
            margin: 0;
        }
        .error-code {
            font-size: 8em;
            font-weight: bold;
            color: #ff073a;
        }
        p {
            font-size: 1.5em;
        }
        .hint {
            margin-top: 20px;
            font-size: 1.2em;
            color: #00d1d1;
        }
        .link-home {
            color: #39ff14;
            text-decoration: none;
            border: 1px solid #39ff14;
            padding: 10px 20px;
            margin-top: 30px;
            display: inline-block;
            transition: 0.3s;
        }
        .link-home:hover {
            background-color: #39ff14;
            color: #0d0d0d;
        }
    </style>
</head>
<body>
    <div>
        <div class="error-code">404</div>
        <h1>Página No Encontrada</h1>
        <p>Parece que te has desviado de la misión...</p>
        <p>El objetivo que buscas no está aquí.</p>
        <div class="hint">Pista: a veces, las respuestas están en lugares ocultos.</div>
        <a href="/" class="link-home">Regresar al Cuartel General</a>
    </div>
</body>
</html>
