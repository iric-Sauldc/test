<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subcategoria.nombre }}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/categorias.css">

</head>
<body>
    <div class="container mt-5">
        <h1>{{ subcategoria.nombre }}</h1>
        <p>{{ subcategoria.descripcion }}</p>

        <h3>Desafíos disponibles</h3>

        <div class="list-group">
            {% for desafio, completado in desafios_con_estado %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <h5>{{ desafio.nombre }}</h5>
                        <p>{{ desafio.descripcion }}</p>
                    </div>
                    <div>
                        {% if completado %}
                            <span class="badge bg-success">Completado</span>
                        {% else %}
                            <a href="{{ url_for('desafio', desafio_id=desafio.id) }}" class="btn btn-primary">Resolver</a>
                        {% endif %}
                    </div>
                </div>
            {% endfor %}
        </div>

        <br>
        <a href="{{ url_for('categoria', categoria_id=subcategoria.categoria_id) }}" class="btn btn-secondary">Volver a la categoría</a>
    </div>

    <!-- Scripts de Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
